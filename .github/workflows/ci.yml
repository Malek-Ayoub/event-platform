name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          # gd required by endroid/qr-code + dompdf ticket rendering
          extensions: mbstring, dom, curl, libxml, zip, bcmath, pcntl, pdo, sqlite3, pdo_sqlite, gd, fileinfo, tokenizer, xml, ctype, json, openssl
          coverage: none

      - name: Cache Composer vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.3-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.3-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run test suite
        run: php artisan test

      - name: Check code style
        run: vendor/bin/pint --test
