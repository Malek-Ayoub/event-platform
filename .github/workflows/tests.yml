name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  sqlite:
    name: SQLite (default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations and seeders
        run: php artisan migrate:fresh --seed --no-interaction

      - name: Run tests
        run: php artisan test

  mysql:
    name: MySQL 8 Validation
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: event_platform
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: event_platform
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: MySQL migrate:fresh --seed
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: event_platform
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan migrate:fresh --seed --no-interaction

      - name: MySQL schema:dump
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: event_platform
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan schema:dump --database=mysql

      - name: Run tests against MySQL
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: event_platform
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan test
